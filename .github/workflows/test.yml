name: Run Tests

on:
  pull_request:
    branches: [ master, develop ]
  push:
    branches: [ master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        working-directory: Web/server
        run: npm install
      
      - name: Run linter
        working-directory: Web/server
        run: npm run lint
      
      - name: Run unit tests
        working-directory: Web/server
        run: npm run test:unit
      
      - name: Run integration tests
        working-directory: Web/server
        run: npm run test:integration
      
      - name: Generate coverage report
        working-directory: Web/server
        run: npm run test:coverage
      
      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = './Web/server/coverage/coverage-summary.json';
            
            if (!fs.existsSync(path)) {
              console.log('Coverage report not found, skipping comment');
              return;
            }
            
            const coverage = fs.readFileSync(path, 'utf8');
            const data = JSON.parse(coverage);
            const total = data.total;
            
            const comment = `## Test Coverage Report

| Metric | Coverage |
|--------|----------|
| Statements | ${total.statements.pct}% |
| Branches | ${total.branches.pct}% |
| Functions | ${total.functions.pct}% |
| Lines | ${total.lines.pct}% |

✅ All tests passed`;
            
            // Find existing coverage comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const existingComment = comments.find(comment => 
              comment.user.type === 'Bot' && comment.body.includes('Test Coverage Report')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
