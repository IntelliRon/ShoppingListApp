name: Run Tests

on:
  pull_request:
    branches: [ master, develop ]
  push:
    branches: [ master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        working-directory: Web/server
        run: npm ci
      
      - name: Run unit tests
        working-directory: Web/server
        run: npm run test:unit
      
      - name: Run integration tests
        working-directory: Web/server
        run: npm run test:integration
      
      - name: Generate coverage report
        working-directory: Web/server
        run: npm run test:coverage
      
      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = './Web/server/coverage/coverage-summary.json';
            if (!fs.existsSync(path)) {
              console.log('Coverage report not found');
              return;
            }
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            const total = data.total;
            const comment = `## Coverage Report\n| Metric | Percentage |\n|--------|------------|\n| Statements | ${total.statements.pct}% |\n| Branches | ${total.branches.pct}% |\n| Functions | ${total.functions.pct}% |\n| Lines | ${total.lines.pct}% |`;
            
            // Use PR number directly from pull_request context
            const prNumber = context.payload.pull_request.number;
            
            // List existing comments on the PR
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            
            // Find existing coverage comment from bot
            const bot = comments.find(c => c.user.type === 'Bot' && c.body.includes('Coverage Report'));
            
            if (bot) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: bot.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: comment
              });
            }
