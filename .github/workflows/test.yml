name: Run Tests

on:
  pull_request:
    branches: [ master, develop ]
  push:
    branches: [ master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Install dependencies
        working-directory: Web/server
        run: npm ci
      
      - name: Run unit tests
        working-directory: Web/server
        run: npm run test:unit
      
      - name: Run integration tests
        working-directory: Web/server
        run: npm run test:integration
      
      - name: Generate coverage report
        working-directory: Web/server
        run: npm run test:coverage
      
      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const coveragePath = path.join(process.cwd(), 'Web', 'server', 'coverage', 'coverage-summary.json');
            
            console.log('Current working directory:', process.cwd());
            console.log('Looking for coverage at:', coveragePath);
            
            // Debug: List Web/server directory
            const webServerPath = path.join(process.cwd(), 'Web', 'server');
            if (fs.existsSync(webServerPath)) {
              console.log('Web/server contents:', fs.readdirSync(webServerPath));
              const coverageDir = path.join(webServerPath, 'coverage');
              if (fs.existsSync(coverageDir)) {
                console.log('Coverage directory contents:', fs.readdirSync(coverageDir));
              } else {
                console.log('Coverage directory does not exist');
              }
            }
            
            if (!fs.existsSync(coveragePath)) {
              console.log('⚠️  Coverage report not found at', coveragePath);
              console.log('Skipping PR comment - coverage data unavailable');
              return;
            }
            
            try {
              const data = JSON.parse(fs.readFileSync(coveragePath, 'utf8'));
              const total = data.total;
              const comment = `## Coverage Report\n| Metric | Percentage |\n|--------|------------|\n| Statements | ${total.statements.pct}% |\n| Branches | ${total.branches.pct}% |\n| Functions | ${total.functions.pct}% |\n| Lines | ${total.lines.pct}% |`;
              
              // Use PR number directly from pull_request context
              const prNumber = context.payload.pull_request.number;
              
              // List existing comments on the PR
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber
              });
              
              // Find existing coverage comment from bot
              const bot = comments.find(c => c.user.type === 'Bot' && c.body.includes('Coverage Report'));
              
              if (bot) {
                // Update existing comment
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: bot.id,
                  body: comment
                });
                console.log('✓ Updated existing coverage comment');
              } else {
                // Create new comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: comment
                });
                console.log('✓ Posted new coverage comment to PR');
              }
            } catch (error) {
              console.error('Error posting coverage comment:', error.message);
              throw error;
            }
