<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Shopping List App - Developer Dashboard</title>
		<link rel="stylesheet" href="css/styles.css" />
	</head>

	<body>
		<!-- Toast Notifications -->
		<div id="toast-container" class="toast-container"></div>

		<div id="app" class="app" style="display: none">
			<header class="header">
				<h1>Shopping List App - Developer Dashboard</h1>
				<div id="user-info" class="user-info"></div>
			</header>

			<nav class="sidebar">
				<ul>
					<li>
						<a href="#config" class="nav-link active" data-page="config"
							>Configuration</a
						>
					</li>
					<li><a href="#status" class="nav-link" data-page="status">Server Status</a></li>
					<li><a href="#" id="logout-btn" class="nav-link logout">Logout</a></li>
				</ul>
			</nav>

			<main class="main-content">
				<!-- Configuration Page -->
				<div id="config-page" class="page active">
					<h2>Server Configuration</h2>
					<div id="config-form" class="config-form">
						<!-- Config fields loaded from API -->
					</div>
					<div class="button-group">
						<button id="save-config-btn" class="btn btn-primary">
							Save Configuration
						</button>
						<button id="reload-config-btn" class="btn btn-secondary">
							Reload Runtime
						</button>
					</div>
				</div>

				<!-- Status Page -->
				<div id="status-page" class="page">
					<div class="page-header">
						<h2>Server Status</h2>
						<button id="reload-status-btn" class="btn btn-secondary">
							Reload Status
						</button>
					</div>
					<div id="status-info" class="status-info">
						<!-- Status loaded from API -->
					</div>
				</div>
			</main>
		</div>

		<!-- Login Modal -->
		<div id="login-modal" class="modal active">
			<div class="modal-content">
				<h2>Developer Login</h2>
				<form id="login-form">
					<input type="text" id="username" placeholder="Username" required />
					<div class="password-group">
						<input type="password" id="password" placeholder="Password" required />
						<button
							type="button"
							id="toggle-password"
							class="toggle-password-btn"
							aria-label="Show/hide password"
						>
							<svg
								class="password-icon"
								id="icon-show"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
								<circle cx="12" cy="12" r="3"></circle>
							</svg>
							<svg
								class="password-icon hidden"
								id="icon-hide"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<path
									d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
								></path>
								<line x1="1" y1="1" x2="23" y2="23"></line>
							</svg>
						</button>
					</div>
					<button type="submit" class="btn btn-primary">Login</button>
					<div id="login-error" class="error-message"></div>
				</form>
			</div>
		</div>

		<script src="js/auth.js"></script>
		<script src="js/config.js"></script>
		<script src="js/app.js"></script>
	</body>
</html>
