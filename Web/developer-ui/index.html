<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List App - Developer Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app" class="app">
        <header class="header">
            <h1>Shopping List App - Developer Dashboard</h1>
            <div id="user-info" class="user-info"></div>
        </header>

        <nav class="sidebar">
            <ul>
                <li><a href="#config" class="nav-link active" data-page="config">Configuration</a></li>
                <li><a href="#status" class="nav-link" data-page="status">Server Status</a></li>
                <li><a href="#" id="logout-btn" class="nav-link logout">Logout</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <!-- Configuration Page -->
            <div id="config-page" class="page active">
                <h2>Server Configuration</h2>
                <div id="config-form" class="config-form">
                    <!-- Config fields loaded from API -->
                </div>
                <div class="button-group">
                    <button id="save-config-btn" class="btn btn-primary">Save Configuration</button>
                    <button id="reload-config-btn" class="btn btn-secondary">Reload Runtime</button>
                </div>
            </div>

            <!-- Status Page -->
            <div id="status-page" class="page">
                <h2>Server Status</h2>
                <div id="status-info" class="status-info">
                    <!-- Status loaded from API -->
                </div>
            </div>
        </main>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h2>Developer Login</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn btn-primary">Login</button>
                <div id="login-error" class="error-message"></div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/config.js"></script>
</body>
</html>
